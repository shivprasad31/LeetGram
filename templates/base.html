{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default:'system' }}" data-theme-preference="{{ theme_preference|default:'system' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CodeArena{% endblock %}</title>
  <script>
    (() => {
      const fallbackTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      const storedTheme = localStorage.getItem("codearena-theme");
      const serverTheme = "{{ theme|default:'system' }}";
      const serverPreference = "{{ theme_preference|default:'system' }}";
      const normalizedTheme = storedTheme === "dark" || storedTheme === "light"
        ? storedTheme
        : (serverTheme === "dark" || serverTheme === "light" ? serverTheme : fallbackTheme);
      document.documentElement.dataset.theme = normalizedTheme;
      document.documentElement.dataset.themePreference = serverPreference;
      document.documentElement.style.colorScheme = normalizedTheme;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/theme.css' %}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body data-theme="{{ theme|default:'system' }}" data-theme-preference="{{ theme_preference|default:'system' }}" data-notifications-socket-path="{% if request.user.is_authenticated %}/ws/notifications/{% endif %}">
  <div class="container py-3 nav-shell">
    {% include 'partials/navbar.html' %}
  </div>
  <main class="container">
    {% if messages %}
      <div class="my-3">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'info' }} rounded-4">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    <div data-live-notifications></div>
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
